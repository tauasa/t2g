# spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=./sql/create.sql
# spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-source=metadata

# postgres settings
spring.datasource.url=jdbc:postgresql://localhost:5432/t2g
spring.datasource.username=t2g
spring.datasource.password=t2g
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

