spring.application.name=t2g

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.level.org.tauasa=DEBUG
logging.level.com.h2database=ERROR

springdoc.api-docs.path=/api-docs

# uncomment to generate ./sql/create.sql
